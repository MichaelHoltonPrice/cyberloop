name: improve_bot_sonnet
params:
  model:
    type: string
    default: claude-sonnet-4-6[1m]
  eval_episodes:
    type: int
    default: 4000
  max_evals:
    type: int
    default: 4
fixtures:
  bot: foundry/templates/assets/bots/baseline
do:
  - foreach:
      count: 4
    do:
      - use: improve_bot_lane
        with:
          model: ${params.model}
          max_evals: ${params.max_evals}
          eval_episodes: ${params.eval_episodes}
patterns:
  improve_bot_lane:
    params:
      model:
        type: string
      max_evals:
        type: int
      eval_episodes:
        type: int
    do:
      - run_until:
          name: improve
          block: ImproveBot
          env:
            MODEL: ${params.model}
          continue_on:
            eval_requested:
              max: ${params.max_evals}
          stop_on:
            - normal
