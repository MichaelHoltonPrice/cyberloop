# Runs a Claude agent that edits bot.py. Normal completion commits
# the candidate bot and automatically invokes EvalBot.
name: ImproveBot
runner: container
image: cyberloop-improve-bot-agent:latest
docker_args:
  - -v
  - claude-auth:/home/claude/.claude:rw
env:
  MAX_TURNS: "400"
  COMPACT_TOKEN_LIMIT: "200000"
state: managed
inputs:
  - name: game_engine
    container_path: /source
  - name: bot
    container_path: /input/bot
  - name: score
    container_path: /input/score
    optional: true
outputs:
  normal:
    - name: bot
      container_path: /output/bot
on_termination:
  normal:
    invoke:
      - block: EvalBot
        bind:
          bot: bot
        args:
          - /app/scripts/eval_bot.py
          - --bot
          - /input/bot/bot.py
          - --output-dir
          - /output/score
          - --subclass
          - dueling
          - --episodes
          - ${params.eval_episodes}
          - --n-workers
          - "1"
