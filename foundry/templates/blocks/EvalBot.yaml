# Evaluates a Python bot.py by running gauntlet episodes.
#
# Intended primarily as a child block invoked after ImproveBot commits
# a candidate bot.  The caller supplies the bot artifact and argv
# selecting subclass / episode count.
name: EvalBot
runner: container
image: cyberloop-eval:latest
docker_args:
  - --entrypoint
  - python
inputs:
  - name: bot
    container_path: /input/bot
outputs:
  normal:
    - name: score
      container_path: /output/score
  aborted:
    - name: score
      container_path: /output/score
