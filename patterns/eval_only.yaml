description: |
  Single evaluation pass of a pre-staged checkpoint against the
  Decker gauntlet.  Runs the ``Eval`` container once with the
  knobs declared below, writes ``scores.json`` (and an
  informational ``output_manifest.json``) into a fresh ``score``
  artifact instance, and ends the run when the container exits.

  The pattern is deliberately fixed-config: subclass and episode
  budget are baked into ``overrides:`` rather than threaded
  through project-side CLI args.  Operators that want different
  knobs copy this pattern; full per-run parameterization lands
  alongside the train-eval loop pattern in a later commit.

  Pre-conditions: the operator must register a ``checkpoint``
  artifact instance in the workspace whose contents include
  ``checkpoint.pt`` (and optionally ``config.json`` /
  ``version.json`` sidecars) before invoking ``flywheel run
  pattern eval_only``.

instances:
  eval:
    # ``continuous`` + ``cardinality: 1`` fires the block once
    # at run start; when the container exits the only driver is
    # done and the runner stops.  ``autorestart`` would loop
    # forever — wrong shape for a single eval pass.
    block: Eval
    trigger: {kind: continuous}
    cardinality: 1
    inputs: [checkpoint]
    overrides:
      subclass: dueling
      episodes: 4000
      backend: numpy
